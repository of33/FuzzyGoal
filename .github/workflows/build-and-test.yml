name: build-and-test

on:
  push:
  pull_request:

jobs:
  linux:
    name: Linux ${{ matrix.compiler }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: GCC
            cxx: g++
          - compiler: Clang
            cxx: clang++

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ clang make gnuplot

      - name: Build examples
        run: make CXX=${{ matrix.cxx }}

      - name: Run tests
        run: make test CXX=${{ matrix.cxx }}

  windows-msys2:
    name: Windows MSYS2 UCRT64
    runs-on: windows-2022

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            make
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-gnuplot

      - name: Build examples
        run: make

      - name: Run tests
        run: make test
